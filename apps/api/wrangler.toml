name = "arsenyx-api"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Route Workers behind the api subdomain. The Cloudflare dashboard needs a
# matching Custom Domain (`api.arsenyx.com`) added in the Worker's Triggers tab
# once DNS is set up.
routes = [
  { pattern = "api.arsenyx.com", custom_domain = true },
]

# Secrets (set via `bunx wrangler secret put <NAME>`):
#   DATABASE_URL              — PlanetScale *direct* connection string. Used by
#                               the Prisma CLI (db:push/studio/generate) ONLY.
#                               The Worker runtime reads HYPERDRIVE instead.
#   BETTER_AUTH_SECRET        — `openssl rand -base64 32`
#   GITHUB_CLIENT_ID
#   GITHUB_CLIENT_SECRET

[vars]
BETTER_AUTH_URL = "https://api.arsenyx.com"
WEB_ORIGIN = "https://www.arsenyx.com,https://arsenyx.com"
NODE_ENV = "production"

# Workers Rate Limiting API binding — keyed per IP at the edge, free and
# cheap because the cap is enforced before our handler runs any DB work.
# Used for anon `/builds/search` traffic where there's no session to key on.
# Authenticated users go through the DB-backed UserRateLimitWindow limiter.
[[unsafe.bindings]]
name = "ANON_SEARCH_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 30, period = 60 }

# Broader anon-read throttle for public list/detail endpoints — generous cap
# because a normal page view triggers several requests (list + detail +
# partners). Sized to comfortably accommodate genuine browsing while still
# capping scraper-style enumeration.
[[unsafe.bindings]]
name = "ANON_READ_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 120, period = 60 }

# Cloudflare Hyperdrive → PlanetScale Postgres. The Worker runtime connects via
# env.HYPERDRIVE.connectionString (see src/db.ts); Hyperdrive owns the upstream
# pool, pointed at PlanetScale's direct endpoint. Recreate (e.g. after a role
# rotation) with:
#   bunx wrangler hyperdrive update c99d68f482634c9b944449a03bc6b13d \
#     --connection-string="postgresql://USER:PASS@HOST:5432/postgres?sslmode=verify-full"
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "c99d68f482634c9b944449a03bc6b13d"
# Local dev connection is read from a gitignored env var so the credential is
# never committed: set CLOUDFLARE_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE
# in apps/api/.env (see .env.example).

[observability]
enabled = true
