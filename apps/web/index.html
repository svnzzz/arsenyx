<!doctype html>
<html lang="en" style="color-scheme: light dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Apply stored theme before React mounts to avoid a flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem("arsenyx-theme") || "system";
          var isDark =
            t === "dark" ||
            (t === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (isDark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <meta name="theme-color" content="#09090b" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- No static <title>/<meta description>: the edge Worker
         (worker/index.ts) injects per-page ones into every HTML response,
         and <HeadContent /> manages them client-side. A static copy here
         would be a third, always-stale source duplicating both — and Google
         discards rel=canonical entirely when it sees multiple, so duplicate
         head tags are a liability, not a fallback. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
    />
    <link rel="preconnect" href="https://api.arsenyx.com" />
    <link rel="preconnect" href="https://img.arsenyx.com" />
    <link rel="preconnect" href="https://wiki.warframe.com" />
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
