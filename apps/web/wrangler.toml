name = "arsenyx-web"
compatibility_date = "2026-04-29"

# Custom domains. The zone must use Cloudflare nameservers (already the case
# for arsenyx.com). On first deploy these will fail to attach while the Pages
# project still owns them — remove them from Pages first, or attach via the
# Worker's Triggers tab in the dashboard.
routes = [
  { pattern = "www.arsenyx.com", custom_domain = true },
  { pattern = "arsenyx.com", custom_domain = true },
]

# A tiny Worker (`worker/index.ts`) runs in front of Workers Static Assets for
# every HTML navigation. It 301s the apex host onto www and injects per-page
# <title>/<meta>/<link rel=canonical> into the SPA shell (builds, item pages,
# static routes) so crawlers and unfurl bots see real metadata in the initial
# response. Static asset directories are excluded below and served directly
# by the assets binding, which applies the rules from `public/_headers`.
#
# `not_found_handling = "single-page-application"` makes any unmatched route
# return `/index.html` with a 200, so TanStack Router can take over client-side.
main = "./worker/index.ts"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Pinned to the current Cloudflare default. The embed path (handleBuildPage)
# relies on /embed.html redirecting to /embed; pinning keeps that contract if
# the platform default ever changes.
html_handling = "auto-trailing-slash"
run_worker_first = [
  "/*",
  "!/assets/*",
  "!/data/*",
  "!/icons/*",
  "!/img/*",
  "!/mod-set-icons/*",
  "!/mod-components/*",
  "!/focus-schools/*",
  "!/favicon.svg",
  "!/apple-touch-icon.png",
  "!/robots.txt",
  "!/sitemap.xml",
]

[observability]
enabled = true
