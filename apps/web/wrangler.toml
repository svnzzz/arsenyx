name = "arsenyx-web"
compatibility_date = "2026-04-29"

# Custom domains. The zone must use Cloudflare nameservers (already the case
# for arsenyx.com). On first deploy these will fail to attach while the Pages
# project still owns them — remove them from Pages first, or attach via the
# Worker's Triggers tab in the dashboard.
routes = [
  { pattern = "www.arsenyx.com", custom_domain = true },
  { pattern = "arsenyx.com", custom_domain = true },
]

# A tiny Worker (`worker/index.ts`) runs in front of Workers Static Assets so
# that Discord's link-unfurl bot gets build-specific OG meta tags on
# /builds/:slug pages. Everything else — and every non-bot
# request to /builds/* — falls straight through to the assets binding, which
# applies the `_headers` / `_redirects` rules from `public/_headers`.
#
# `not_found_handling = "single-page-application"` makes any unmatched route
# return `/index.html` with a 200, so TanStack Router can take over client-side.
main = "./worker/index.ts"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Run the Worker first only for build detail pages; all other routes (assets,
# data JSON, other SPA routes) bypass the Worker entirely.
run_worker_first = ["/builds/*"]

[observability]
enabled = true
