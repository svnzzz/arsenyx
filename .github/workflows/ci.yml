name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - run: bun install --frozen-lockfile
        # Triggers apps/api's `postinstall: prisma generate` — no separate step needed.

      - name: Check catalog images (no upstream hotlinks)
        # Fails if apps/web/public/data still points at content/wiki.warframe.com
        # — i.e. a catalog was committed without running `bun run sync:images`.
        run: bun run check:images

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run fmt:check

      - name: Build (web)
        # Must run before typecheck — @tanstack/router-plugin generates
        # apps/web/src/routeTree.gen.ts during vite build, and tsc fails
        # in apps/web without it.
        working-directory: apps/web
        run: bun run build

      - name: Type-check (all workspaces)
        run: bun run typecheck

      - name: Test (all workspaces)
        # Workspace names hard-coded so a new workspace without a `test`
        # script doesn't break CI. Keep in sync with the `test` recipe in
        # `justfile` when adding a workspace.
        run: bun --filter=arsenyx-web --filter=arsenyx-api --filter=@arsenyx/shared run test

      - name: Test (build pipeline)
        # Pure-function unit tests for scripts/build/* (run via bun's test
        # runner, not vitest). Keep in sync with the `test` recipe in justfile.
        run: bun test scripts/build/
