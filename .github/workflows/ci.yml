name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# CI only reads the repo and runs checks — it never needs write. Least-privilege
# token so a compromised action/dependency can't push or open PRs with it.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so check:data-version can diff the catalog against
          # origin/main (the default base ref).
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      # Cache only Bun's global install cache (not node_modules); Bun rebuilds
      # node_modules from it. Keyed on the lockfile so a dep change busts it.
      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile
        # Triggers apps/api's `postinstall: prisma generate` — no separate step needed.

      - name: Check catalog images (no upstream hotlinks)
        # Fails if apps/web/public/data still points at content/wiki.warframe.com
        # — i.e. a catalog was committed without running `bun run sync:images`.
        run: bun run check:images

      - name: Check catalog cache-version bumped
        # Fails if apps/web/public/data changed without a fresh meta.json
        # generatedAt — a hand-edit that would be masked by the immutable
        # ?v=<generatedAt> cache. Fix with `bun run data:stamp`.
        env:
          # Diff against the PR's target branch (or main on push). fetch-depth:0
          # above makes this remote-tracking ref available; pinning it here keeps
          # the guard from silently no-op'ing on the default if it's absent.
          DATA_VERSION_BASE: origin/${{ github.base_ref || 'main' }}
        run: bun run check:data-version

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run fmt:check

      - name: Build (web)
        # Must run before typecheck — @tanstack/router-plugin generates
        # apps/web/src/routeTree.gen.ts during vite build, and tsc fails
        # in apps/web without it.
        working-directory: apps/web
        run: bun run build

      - name: Type-check (all workspaces)
        run: bun run typecheck

      - name: Test (all workspaces)
        # Workspace names hard-coded so a new workspace without a `test`
        # script doesn't break CI. Keep in sync with the `test` recipe in
        # `justfile` when adding a workspace.
        run: bun --filter=arsenyx-web --filter=arsenyx-api --filter=@arsenyx/shared run test

      - name: Test (build pipeline)
        # Pure-function unit tests for scripts/build/* (run via bun's test
        # runner, not vitest). Keep in sync with the `test` recipe in justfile.
        run: bun test scripts/build/
