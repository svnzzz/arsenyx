name: Update Warframe Data

on:
  schedule:
    - cron: "0 2 * * 0" # Sunday 02:00 UTC
  workflow_dispatch: {} # Manual trigger

# The pipeline pulls game data directly from DE PublicExport and the wiki
# Lua modules — no npm dep to bump. The raw mirror (`data/raw/`) is gitignored
# and re-fetched here each run, so the only committed diff is the rebuilt
# catalog under `apps/web/public/data/`.

# Serialize runs so a manual dispatch can't race the Sunday cron on the shared
# auto/update-warframe-data branch and its create-pull-request step.
concurrency:
  group: update-warframe-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13 # keep in sync with ci.yml

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      # --frozen-lockfile so a transitive lockfile bump can't ride into the
      # auto-PR unreviewed (the commit is also scoped via add-paths below).
      - run: bun install --frozen-lockfile

      - name: Sync upstream + rebuild items
        run: bun run data:bump
        # data:bump runs `sync:images --skip-if-no-creds` as its last step;
        # with these present it mirrors new images into R2 and rewrites the
        # catalog to img.arsenyx.com, so the auto-PR already passes
        # check:images. If any secret is unset, sync:images self-skips and the
        # PR lands hotlinked (recoverable by running sync:images on the branch).
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      # No typecheck/lint/test here — this job only refreshes data and opens a
      # PR. That PR triggers ci.yml, which runs the full gauntlet (web build →
      # typecheck → tests → check:images) with the build-first ordering that
      # generates apps/web/src/routeTree.gen.ts (gitignored). Running
      # `bun run typecheck` here without that build step fails in apps/web.

      - name: Check for changes
        id: diff
        run: |
          # data/raw/ is gitignored (re-fetched each run), so it never appears
          # in `git diff`. Gate on the committed catalog only, excluding the
          # build-stamp files: meta.json carries a fresh generatedAt and
          # _report.json is build telemetry, so both change every run — leaving
          # them in would open a noise PR every Sunday even when no game data
          # actually moved.
          if git diff --quiet -- apps/web/public/data/ \
            ':(exclude)apps/web/public/data/meta.json' \
            ':(exclude)apps/web/public/data/_report.json'; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: auto/update-warframe-data
          # Scope the commit to generated data so a stray bun.lock / build
          # artifact can't ride into the auto-PR. The raw mirror is gitignored;
          # data/curated/ holds the build's wiki-image-url cache.
          add-paths: |
            apps/web/public/data/**
            data/curated/**
          title: "chore: refresh Warframe game data"
          body: |
            Automated weekly refresh of the static catalog
            (`apps/web/public/data/`), rebuilt from a fresh DE PublicExport +
            wiki Lua sync. The raw mirror (`data/raw/`) is gitignored, so only
            the rebuilt catalog appears in this diff.

            Review the catalog JSON diff before merging.
            Any new wiki Class strings or DE compatNames not yet curated
            will fail the build — fix `data/curated/` if so.

            Images are mirrored to R2 and the catalog rewritten to
            img.arsenyx.com automatically (the cron has R2 creds), so CI's
            check:images guard should pass. If it fails, an R2 secret is
            likely missing — check out this branch and run `bun run sync:images`.
          commit-message: "chore: refresh Warframe game data"
